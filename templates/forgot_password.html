{% extends 'auth_base.html' %}

{% block title %}Forgot Password — AI Email Agent{% endblock %}

{% block content %}
<section class="auth-panel auth-panel--forgot" aria-labelledby="forgot-title">
  <div class="auth-panel__heading">
    <h1 id="forgot-title" class="auth-title">Forgot Password</h1>
    <p class="auth-subtitle">Type your email and click send code button first</p>
  </div>

  <form class="auth-form auth-form--forgot" action="{{ url_for('forgot_password') }}" method="post">
    <div class="auth-code-row">
      <div class="auth-field">
        <label class="sr-only" for="forgot-email">Your Email</label>
        <input class="auth-input" type="email" id="forgot-email" name="email" placeholder="Your Email" autocomplete="email" required>
      </div>
      <button class="auth-code-button" type="button">Send Code</button>
    </div>

    <div class="auth-field">
      <label class="sr-only" for="forgot-code">Authentication code</label>
      <input class="auth-input" type="text" id="forgot-code" name="auth_code" placeholder="Type the Auth Code Here" inputmode="numeric" autocomplete="one-time-code" required>
    </div>

    <div class="auth-field auth-field--password">
      <label class="sr-only" for="forgot-password">New Password</label>
      <input class="auth-input" type="password" id="forgot-password" name="password" placeholder="New Password" autocomplete="new-password" required>
      <button class="auth-password-toggle" type="button" data-password-toggle aria-label="Show password" aria-controls="forgot-password">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="auth-field">
      <label class="sr-only" for="forgot-password-confirm">New Password again</label>
      <input class="auth-input" type="password" id="forgot-password-confirm" name="password_confirm" placeholder="New Password again" autocomplete="new-password" required>
    </div>

    <button type="submit" class="btn auth-submit">Reset Password</button>
  </form>

  <p class="auth-switch">Remembered your password? <a href="{{ url_for('login') }}">Log In</a></p>
</section>
{% endblock %}
