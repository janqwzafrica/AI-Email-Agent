{% extends 'base.html' %}

{% block title %}Schedule Campaign — AI Email Agent{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/ai-wizard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/campaign_preview.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/wizard.css') }}">
{% endblock %}

{% block content %}
<h1 class="page-heading">Schedule Campaign</h1>

<a href="{{ url_for('wizard_test_send', mode=mode) }}" class="back-link">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M19 12H5M12 19l-7-7 7-7"/>
  </svg>
  Go Back
</a>

<div class="preview-layout">
  <div>
    {% include 'partials/content_preview.html' %}
  </div>

  <div class="schedule-rail" id="scheduleRail" data-action-url="{{ url_for('wizard_schedule_action', mode=mode) }}">
    <div class="form__field">
      <label class="form__label" for="senderEmailDisplay">Sender Email</label>
      <input class="form__input" id="senderEmailDisplay" type="text" value="{{ sender_emails[0] if sender_emails else '' }}" readonly disabled>
    </div>
    <div class="form__field">
      <label class="form__label" for="senderNameDisplay">Sender Name</label>
      <input class="form__input" id="senderNameDisplay" type="text" value="{{ sender_name or '' }}" readonly disabled>
    </div>
    <div class="form__field">
      <label class="form__label" for="emailSubjectDisplay">Email Subject</label>
      <input class="form__input" id="emailSubjectDisplay" type="text" value="{{ email_subject or '' }}" readonly disabled>
    </div>
    <div class="form__field">
      <label class="form__label" for="emailListDisplay">Email List</label>
      <input class="form__input" id="emailListDisplay" type="text" value="{{ email_lists[0].name if email_lists else '' }}" readonly disabled>
    </div>

    <div class="form__field">
      <label class="form__label" for="scheduleDateTime">Schedule for</label>
      <input class="form__input" id="scheduleDateTime" type="datetime-local">
    </div>

    <div class="schedule-actions">
      <button type="button" class="btn btn--primary" id="scheduleBtn">Schedule</button>
      <button type="button" class="btn btn--primary" id="runNowBtn">Run Now</button>
      <button type="button" class="btn btn--dark" id="finishBtn">Finish</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/wizard_schedule.js') }}"></script>
{% endblock %}
