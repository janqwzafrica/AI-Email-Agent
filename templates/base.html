<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Email Agent{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/topbar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/sidebar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/cards.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/tables.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/forms.css') }}">
  {% block styles %}{% endblock %}
</head>
<body>
  <div class="app">
    {% include 'partials/header.html' %}
    <div class="app__body">
      {% include 'partials/sidebar.html' %}
      <main class="app__main">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
