{% extends 'base.html' %}

{% block title %}Preview Campaign — AI Email Agent{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/ai-wizard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/campaign_preview.css') }}">
{% endblock %}

{% block content %}
<h1 class="page-heading">Preview Campaign</h1>

<a href="{{ url_for('campaign_recipients', campaign_id=campaign_id) }}" class="back-link">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M19 12H5M12 19l-7-7 7-7"/>
  </svg>
  Go Back
</a>

<div class="preview-layout">
  <div>
    {% include 'partials/content_preview.html' %}
  </div>

  <div class="preview-settings">
    {% include 'partials/campaign_settings_fields.html' %}
  </div>
</div>
{% endblock %}
