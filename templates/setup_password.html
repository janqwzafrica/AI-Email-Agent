{% extends 'auth_base.html' %}

{% block title %}Set Up Password — AI Email Agent{% endblock %}

{% block content %}
<section class="auth-panel" aria-labelledby="setup-title">
  <div class="auth-panel__heading">
    <h1 id="setup-title" class="auth-title">Set Up Your Password</h1>
    <p class="auth-subtitle">Choose a password for {{ user.email }} to activate your account</p>
  </div>

  <form class="auth-form" action="{{ url_for('setup_password', user_id=user.id) }}" method="post">
    <input type="hidden" name="token" value="{{ token }}">

    <div class="auth-field auth-field--password">
      <label class="sr-only" for="setup-password">New Password</label>
      <input class="auth-input" type="password" id="setup-password" name="password" placeholder="New Password" autocomplete="new-password" required>
      <button class="auth-password-toggle" type="button" data-password-toggle aria-label="Show password" aria-controls="setup-password">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="auth-field">
      <label class="sr-only" for="setup-password-confirm">New Password again</label>
      <input class="auth-input" type="password" id="setup-password-confirm" name="password_confirm" placeholder="New Password again" autocomplete="new-password" required>
    </div>

    <button type="submit" class="btn auth-submit" data-loading-text="Saving password...">Save Password</button>
  </form>

  <p class="auth-switch">Already set your password? <a href="{{ url_for('login') }}">Log In</a></p>
</section>
{% endblock %}
