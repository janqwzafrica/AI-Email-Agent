<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Email Agent{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/auth.css') }}">
</head>
<body class="auth-page">
  <header class="auth-header">
    <a href="{{ url_for('login') }}" class="auth-header__brand" aria-label="AI Email Agent login">
      <img src="{{ url_for('static', filename='img/logo.png') }}"
           alt="Business &amp; Projects Analysts" class="auth-header__logo">
    </a>
  </header>

  <main class="auth-main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="auth-flashes" role="status" aria-live="polite">
          {% for category, message in messages %}
            <p class="auth-flash auth-flash--{{ category }}">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
