<div class="form__field">
  <label class="form__label" for="sender-email">Sender Email</label>
  <select class="form__select" id="sender-email" disabled>
    {% for email in (sender_emails or ["info@larhdellaw.com"]) %}
    <option>{{ email }}</option>
    {% endfor %}
  </select>
</div>
<div class="form__field">
  <label class="form__label" for="sender-name">Sender Name</label>
  <input class="form__input" id="sender-name" type="text" value="{{ sender_name or 'Larhdel Law' }}" readonly>
</div>
<div class="form__field">
  <label class="form__label" for="email-subject">Email Subject</label>
  <input class="form__input" id="email-subject" type="text" value="{{ email_subject or '' }}" readonly>
</div>
<div class="form__field">
  <label class="form__label" for="email-list">Email List</label>
  <select class="form__select" id="email-list" disabled>
    {% for list in (email_lists or []) %}
    <option>{{ list.name }}</option>
    {% endfor %}
  </select>
</div>
