{% extends 'base.html' %}

{% block title %}Add/Edit User — AI Email Agent{% endblock %}

{% block content %}
<h1 class="page-heading">User Accounts</h1>

<form class="form" action="#" method="post">
  <h2 class="form__title">Add/Edit User</h2>

  <div class="form__grid">
    <div class="form__field">
      <label class="form__label" for="first-name">First Name</label>
      <input class="form__input" type="text" id="first-name" name="first_name" placeholder="First Name">
    </div>
    <div class="form__field">
      <label class="form__label" for="last-name">Last Name</label>
      <input class="form__input" type="text" id="last-name" name="last_name" placeholder="Last Name">
    </div>

    <div class="form__field form__field--full">
      <label class="form__label" for="email">Email</label>
      <input class="form__input" type="email" id="email" name="email" placeholder="useremail@gmail.com">
    </div>

    <div class="form__field">
      <label class="form__label" for="contact-number">Contact Number</label>
      <input class="form__input" type="tel" id="contact-number" name="contact_number" placeholder="+1 000 000 000">
    </div>
    <div class="form__field">
      <label class="form__label" for="access-level">Access Level</label>
      <select class="form__select" id="access-level" name="access_level">
        <option>Admin</option>
        <option>Staff</option>
      </select>
    </div>

    <div class="form__field form__field--full">
      <label class="form__label" for="password">Password</label>
      <input class="form__input" type="password" id="password" name="password" placeholder="••••••••••••">
    </div>
  </div>

  <div class="form__actions">
    <a href="{{ url_for('user_accounts') }}" class="btn btn--dark">Cancel</a>
    <button type="submit" class="btn btn--primary">Save</button>
  </div>
</form>
{% endblock %}
