{% extends 'auth_base.html' %}

{% block title %}Create an Account — AI Email Agent{% endblock %}

{% block content %}
<section class="auth-panel" aria-labelledby="signup-title">
  <div class="auth-panel__heading">
    <h1 id="signup-title" class="auth-title">Create an Account</h1>
    <p class="auth-subtitle">Create a free account</p>
  </div>

  <form class="auth-form" action="{{ url_for('signup') }}" method="post">
    <div class="auth-field">
      <label class="sr-only" for="signup-email">Email</label>
      <input class="auth-input" type="email" id="signup-email" name="email" placeholder="Email" autocomplete="email" value="{{ email | default('') }}" required>
    </div>

    <div class="auth-field auth-field--password">
      <label class="sr-only" for="signup-password">Password</label>
      <input class="auth-input" type="password" id="signup-password" name="password" placeholder="Password" autocomplete="new-password" required>
      <button class="auth-password-toggle" type="button" data-password-toggle aria-label="Show password" aria-controls="signup-password">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="auth-field">
      <label class="sr-only" for="signup-password-confirm">Password again</label>
      <input class="auth-input" type="password" id="signup-password-confirm" name="password_confirm" placeholder="Password again" autocomplete="new-password" required>
    </div>

    <button type="submit" class="btn auth-submit" data-loading-text="Creating account...">Register</button>
  </form>

  <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
</section>
{% endblock %}
